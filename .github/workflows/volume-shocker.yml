name: Run Volume Shocker FNO

on:
  schedule:
    - cron: '55 3 * * *'    # 9:25 AM IST
    - cron: '45 9 * * *'    # 3:15 PM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Volume Shocker Script
      run: python Volume_Shocker_fno.py
      env:
        API_KEY: ${{ secrets.API_KEY }}

    - name: Commit and Push Output Files
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update Volume Shocker outputs - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Send Telegram Notification
      if: always()   # Sends message on success and failure
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          MESSAGE="✅ Volume Shocker FNO Ran Successfully"
        else
          MESSAGE="❌ Volume Shocker FNO Failed"
        fi
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MESSAGE at $(date -u +'%Y-%m-%d %H:%M:%S UTC')%0A%0A🔗 Check Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
