name: Run Volume Shocker FNO

on:
  schedule:
    - cron: '55 3 * * *'    # 9:25 AM IST
    - cron: '45 9 * * *'    # 3:15 PM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'     # ← Changed to 3.12

    - name: Install System Packages
      run: sudo apt-get update && sudo apt-get install -y python3-dev libxml2-dev libxslt1-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install -r requirements.txt --no-cache-dir

    - name: Run Volume Shocker Script
      run: python Volume_Shocker_fno.py
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: Commit Output Files
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --staged --quiet; then
          echo "No files to commit"
        else
          git commit -m "Update outputs - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Telegram Notification
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          MSG="✅ Volume Shocker FNO Success"
        else
          MSG="❌ Volume Shocker FNO Failed"
        fi
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MSG%0A$(date -u +'%Y-%m-%d %H:%M:%S UTC')%0A🔗 Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
